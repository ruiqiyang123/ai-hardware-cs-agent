name: CI

on:
  push:
    branches: [main, "codex/**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # 单元测试不调用真实 LLM/API，dummy key 仅保证模型实例在导入时可构造
      DASHSCOPE_API_KEY: dummy
      # CI 用本地哈希 embedding，避免依赖外部 embedding 服务
      EMBEDDING_PROVIDER: local
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -v
