[server]
headless = true
port = 8501
enableCORS = false
enableWebsocketCompression = false

[theme]
# 温和的科技蓝，比默认红更适合售后客服场景
primaryColor = "#2E7CF6"
backgroundColor = "#FFFFFF"
secondaryBackgroundColor = "#F5F7FB"
textColor = "#1F2937"
font = "sans serif"

[logger]
level = "info"

[browser]
gatherUsageStats = false
